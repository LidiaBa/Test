<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Wish List</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
    <h1>Вход</h1>

    <form id="login-form">
        <div class="form-group">
            <label>Логин:</label>
            <input type="text" id="login" required>
        </div>
        <div class="form-group">
            <label>Пароль:</label>
            <input type="password" id="password" required>
        </div>
        <button type="submit">Войти</button>
        <p><a href="/register.html">Нет аккаунта? Зарегистрироваться</a></p>
        <div id="error-message" class="error"></div>
    </form>
</div>

<script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const login = document.getElementById('login').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch('/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `login=${encodeURIComponent(login)}&password=${encodeURIComponent(password)}`
            });

            const data = await response.json();

            if (data.token && data.token.token) {
                // Сохраняем токен и информацию о пользователе
                localStorage.setItem('token', data.token.token);
                localStorage.setItem('user', JSON.stringify(data.token.user));
                window.location.href = '/profile.html';
            } else {
                document.getElementById('error-message').innerText = 'Неверный логин или пароль';
            }
        } catch (error) {
            document.getElementById('error-message').innerText = 'Ошибка подключения к серверу';
        }
    });
</script>
</body>
</html>
